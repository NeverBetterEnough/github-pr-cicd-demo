name: CI-CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cicd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

      - name: Upload PR preview artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v5
        with:
          name: pr-preview-${{ github.event.pull_request.number }}
          path: dist
          retention-days: 7

      - name: Post PR comment with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const testOutput = fs.existsSync('test-results.txt')
              ? fs.readFileSync('test-results.txt', 'utf8')
              : 'Tests completed successfully (Node.js --test runner)';

            const comment = `## 🤖 CI Report

            ### ✅ Tests Passed
            \`\`\`
            ${testOutput}
            \`\`\`

            ### 📦 Build
            Build artifact uploaded: \`pr-preview-${{ github.event.pull_request.number }}\`

            ### 🚀 Auto-Merge
            CI passed. Run \`/full-pipeline merge\` or reply "merge" to auto-merge when approved.`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment,
            });

  deploy:
    name: Deploy to GitHub Pages
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: test-and-build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Health check
        run: |
          echo "Waiting for deployment to propagate..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ steps.deployment.outputs.page_url }}" || echo "000")
          echo "Health check: HTTP $STATUS"
          if [ "$STATUS" -ne 200 ]; then
            echo "⚠️ Health check returned $STATUS — deployment may still be propagating"
          else
            echo "✅ Health check passed"
          fi
