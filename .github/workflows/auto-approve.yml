name: Auto-Approve & Merge

# This workflow listens for PR comments with "/full-pipeline merge" or "merge"
# from the PR author or repo collaborators, and enables auto-merge when CI passes.

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: read

jobs:
  auto-merge:
    name: Enable Auto-Merge
    if: |
      github.event.issue.pull_request &&
      (
        contains(github.event.comment.body, '/full-pipeline merge') ||
        contains(github.event.comment.body, '!merge') ||
        github.event.comment.body == 'merge'
      )
    runs-on: ubuntu-latest

    steps:
      - name: Check comment author is PR author or collaborator
        uses: actions/github-script@v7
        with:
          script: |
            const prNumber = context.issue.number;
            const commentAuthor = context.payload.comment.user.login;

            // Get PR details
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });

            const prAuthor = pr.data.user.login;

            // Get collaborator status
            const { data: permission } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: commentAuthor,
            });

            const isAuthorized =
              commentAuthor === prAuthor ||
              ['admin', 'write', 'maintain'].includes(permission.permission);

            if (!isAuthorized) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: `⚠️ @${commentAuthor} — only the PR author (@${prAuthor}) or repo collaborators can trigger auto-merge.`,
              });
              core.setFailed('Unauthorized comment author');
              return;
            }

            // Enable auto-merge
            try {
              await github.rest.pulls.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                merge_method: 'squash',
              });
              console.log(`✅ PR #${prNumber} merged by @${commentAuthor}`);
            } catch (error) {
              // If merge fails (e.g., branch protection requires CI to pass),
              // enable auto-merge instead
              if (error.message.includes('required status check')) {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  auto_merge: {
                    merge_method: 'squash',
                  },
                });
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: `🚀 Auto-merge enabled for PR #${prNumber} by @${commentAuthor}.

                  The PR will be automatically merged when:
                  - ✅ All CI checks pass
                  - ✅ Required reviews are complete (if configured)

                  GitHub will handle the merge automatically — no further action needed.`,
                });
                console.log(`✅ Auto-merge enabled for PR #${prNumber}`);
              } else {
                throw error;
              }
            }
